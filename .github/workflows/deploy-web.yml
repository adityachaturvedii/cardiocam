name: Deploy web to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web.yml'
  # Allow manual runs — handy when we want to re-deploy without a code change
  # (e.g. after flipping the Pages source setting the first time).
  workflow_dispatch:

# Only one deploy runs at a time. Skip queued-up runs so the latest master
# always wins — no point deploying intermediate states.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npx tsc -b

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
